
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Shopping Basket</title>
    <link rel="stylesheet" href="styles.css">
    <link href="custom.css" rel="stylesheet">	
<!-- Navigation -->
    <div class="navbar">
	<nav>
	    <div class="dropdown"><button class="dropbtn">options<i class="fa fa-caret-down"></i></button><div class="dropdown-content">
			<a href="./index.html">Dashboard</a>
		</div></div>
	</nav>
	</div>
<style>
        body {
            background-color: #50F9FA; /* Change this color as needed */
        }
    </style>


</head>
<body>
    <h1>order</h1>
    <div class="shop">
        <!-- Product List -->
        <div class="product" data-name="drink" data-price="1.00">
            <p>
<input id="lst_drinks" list="drinks">

<datalist id="drinks">
  <option value="orange juice ~ £1.00">
  <option value="J2O ~ £1.00">
  <option value="coffe ~ £2.00">
  <option value="latte ~ £3.00">
  <option value="slushies ~ £3.00">
  <option value="lemonade ~ £2.00">
  <option value="surprise ~ £0.01">
  <option value="pepsi ~ £1.00">
  <option value="smoothies(blueberry) ~ £1.50">
  <option value="smoothies(banana) ~ £1.50">
  <option value="smoothies(strawberry) ~ £1.50">
  <option value="smoothies(Chocolate) ~ £1.50">
  <option value="smoothies(Vanilla) ~ £1.50">
  <option value="coke ~ £1.00">
</datalist>
</p>
	<h3><p>drink</p></h3>
            <button onclick="addToBasket(output_selection('lst_drinks', 'Drinks'), get_price('lst_drinks'))">Add to Basket</button>
        </div>
<br>
        <div class="product" data-name="ice cream" data-price="1.50">

            <p>
<input id="lst_icecream" list="ice cream">

<datalist id="ice cream">
  <option value="strawbery ~ £1.00">
  <option value="chocolate ~ £1.00">
  <option value="mint ~ £1.00">
  <option value="mint chock chip ~ £1.50">
  <option value="salted caremal ~ £1.50">
  <option value="rocky road ~ £2.00">
  <option value="bubblegum ~ £1.50">
  <option value="lemon meringue ~ £1.50">
  <option value="banana ~ £1.00">
  <option value="cookies and cream ~ £2.00">
  <option value="chocolate ~ £1.0">
  <option value="neapoliten ~ £3.00">
  <option value="oreo ~ £1.50">
  <option value="vanila ~ £1.00"
</datalist>
</p>
	<h3><p>ice cream</p></h3>
            <button onclick="addToBasket(output_selection('lst_icecream', 'Ice cream'), get_price('lst_icecream'))">Add to Basket</button>
        </div>
<br>
        <div class="product" data-name="sundae" data-price="0.75">
            <p>
<input id="lst_sundaes" list="sundaes">

<datalist id="sundaes">
  <option value="chocolate ~ £2.00">
  <option value="kinder bueno ~ £2.50">
  <option value="sherbert ~ £2.00">
  <option value="classic ~ £2.00">
  <option value="monster ~ £3.00">
  <option value="banana ~ £2.00">
  <option value="bubblegum ~ £2.00">
</datalist>
</p>
	<p><h3>sundae</h3></p>
            <button onclick="addToBasket(output_selection('lst_sundaes', 'Sundaes'), get_price('lst_sundaes'))">Add to Basket</button>
        </div>
    </div>

    <!-- Basket Section -->
    <h2>Your Basket</h2>
    <div id="basket">
        <ul id="basket-items"></ul>
        <p>Total: £<span id="total">0.00</span></p>
    </div>
	<button type="button">Send Order</button>

    <script src="script.js"></script>

<script>
	function output_selection(element_id, type){
            console.log("Hey Joshua - here is the item: " + document.getElementById(element_id).value);
	    return "[" + type + "] " + document.getElementById(element_id).value.split("~")[0].trim();
	}

        function get_price(element_id){
	    return parseFloat(document.getElementById(element_id).value.split("~")[1].trim().replace("£",""));
	}
</script>


</body>
</html>
